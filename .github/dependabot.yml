version: 2
updates:
  - package-ecosystem: pip
    directory: /langgraph-agent
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    labels: [dependencies, python, langgraph-agent]
    commit-message:
      prefix: "fix(deps)"
      include: scope
    groups:
      minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        update-types: [patch, minor, major]

  - package-ecosystem: pip
    directory: /telegram-bot
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    labels: [dependencies, python, telegram-bot]
    commit-message:
      prefix: "fix(deps)"
      include: scope
    groups:
      minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        update-types: [patch, minor, major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "fix(ci)"
      include: scope

  - package-ecosystem: docker
    directory: /langgraph-agent
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 2
    labels: [dependencies, docker, langgraph-agent]
    commit-message:
      prefix: "fix(deps)"
      include: scope

  - package-ecosystem: docker
    directory: /telegram-bot
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 2
    labels: [dependencies, docker, telegram-bot]
    commit-message:
      prefix: "fix(deps)"
      include: scope
