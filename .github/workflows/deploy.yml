name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - docs/**
      - .sisyphus/**
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Compile all Python sources
        run: |
          python -m compileall -q telegram-bot langgraph-agent

      - name: Bot.py orphan-reference check
        run: |
          python - <<'EOF'
          """
          Catches the failure mode from session 2026-05-30: cmd_deps registered
          via add_handler() but the function was never defined. py_compile
          passed, deploy succeeded, runtime crashed on first /deps invocation.

          Strategy: parse bot.py AST, find every CommandHandler("name", target)
          and JobQueue.run_*(callback, ...), confirm each target/callback is
          a function defined in the same module.
          """
          import ast, sys, pathlib

          src = pathlib.Path("telegram-bot/bot.py").read_text()
          tree = ast.parse(src)

          defined = {
              node.name
              for node in ast.walk(tree)
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))
          }

          referenced: list[tuple[str, int]] = []

          for node in ast.walk(tree):
              if not isinstance(node, ast.Call):
                  continue
              func = node.func
              fname = (
                  func.attr if isinstance(func, ast.Attribute)
                  else func.id if isinstance(func, ast.Name)
                  else None
              )
              if fname == "CommandHandler" and len(node.args) >= 2:
                  target = node.args[1]
                  if isinstance(target, ast.Name):
                      referenced.append((target.id, target.lineno))
              elif fname in {"run_daily", "run_repeating", "run_once"} and node.args:
                  cb = node.args[0]
                  if isinstance(cb, ast.Name):
                      referenced.append((cb.id, cb.lineno))

          missing = [(name, lineno) for name, lineno in referenced if name not in defined]
          if missing:
              print("ORPHAN REFERENCES detected in telegram-bot/bot.py:")
              for name, lineno in missing:
                  print(f"  line {lineno}: '{name}' is referenced but never defined")
              sys.exit(1)

          print(f"OK: {len(referenced)} handler/scheduler refs all defined ({len(defined)} total functions)")
          EOF

      - name: Langgraph-agent main.py cross-module orphan-reference check
        run: |
          python - <<'EOF'
          """
          Same idea as the bot.py check, but for langgraph-agent/app/main.py.
          Catches the case where main.py calls module.attr(...) (e.g.
          pr_review.handle_pr_event) but the target attribute was renamed
          or never defined in the sibling module.

          Strategy: walk main.py AST for Attribute nodes whose value is a
          local import (from . import X, Y, ...). For each module.attr ref,
          parse the sibling .py file and confirm attr is a top-level name
          (function, class, assignment, or re-import).
          """
          import ast, sys, pathlib

          app_dir = pathlib.Path("langgraph-agent/app")
          main_file = app_dir / "main.py"
          tree = ast.parse(main_file.read_text())

          local_modules: set[str] = set()
          for node in ast.walk(tree):
              if isinstance(node, ast.ImportFrom) and node.level == 1 and node.module is None:
                  for alias in node.names:
                      local_modules.add(alias.asname or alias.name)

          refs: list[tuple[str, str, int]] = []
          for node in ast.walk(tree):
              if not isinstance(node, ast.Attribute):
                  continue
              if not isinstance(node.value, ast.Name):
                  continue
              if node.value.id not in local_modules:
                  continue
              refs.append((node.value.id, node.attr, node.lineno))

          def defined_names(path: pathlib.Path) -> set[str]:
              if not path.exists():
                  return set()
              names: set[str] = set()
              for node in ast.parse(path.read_text()).body:
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                      names.add(node.name)
                  elif isinstance(node, ast.Assign):
                      for target in node.targets:
                          if isinstance(target, ast.Name):
                              names.add(target.id)
                  elif isinstance(node, ast.AnnAssign) and isinstance(node.target, ast.Name):
                      names.add(node.target.id)
                  elif isinstance(node, (ast.Import, ast.ImportFrom)):
                      for alias in node.names:
                          names.add(alias.asname or alias.name.split(".")[0])
              return names

          cache: dict[str, set[str]] = {}
          missing: list[tuple[str, str, int]] = []
          for module, attr, lineno in refs:
              if module not in cache:
                  cache[module] = defined_names(app_dir / f"{module}.py")
              if attr not in cache[module]:
                  missing.append((module, attr, lineno))

          if missing:
              print("ORPHAN REFERENCES detected in langgraph-agent/app/main.py:")
              seen = set()
              for module, attr, lineno in missing:
                  key = (module, attr)
                  if key in seen:
                      continue
                  seen.add(key)
                  print(f"  line {lineno}: '{module}.{attr}' referenced but not defined in {module}.py")
              sys.exit(1)

          print(f"OK: {len(refs)} cross-module refs resolved across {len(cache)} modules")
          EOF

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pytest + bot/agent runtime deps
        run: |
          pip install --quiet pytest
          pip install --quiet -r telegram-bot/requirements.txt
          pip install --quiet -r langgraph-agent/requirements.txt

      - name: Run pytest
        run: pytest -v

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CALCOM_SECRET: ${{ secrets.CALCOM_SECRET }}
          CALCOM_ENCRYPTION_KEY: ${{ secrets.CALCOM_ENCRYPTION_KEY }}
          CALCOM_API_KEY: ${{ secrets.CALCOM_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          N8N_USER: ${{ secrets.N8N_USER }}
          N8N_PASSWORD: ${{ secrets.N8N_PASSWORD }}
          N8N_HOST: ${{ secrets.N8N_HOST }}
          CALCOM_HOST: ${{ secrets.CALCOM_HOST }}
          DOMAIN: ${{ secrets.DOMAIN }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          AGENT_HOST: ${{ secrets.AGENT_HOST }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          GITLAB_WEBHOOK_SECRET: ${{ secrets.GITLAB_WEBHOOK_SECRET }}
          WHISPER_API_BASE: ${{ secrets.WHISPER_API_BASE }}
          WHISPER_API_KEY: ${{ secrets.WHISPER_API_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USERS,DATABASE_URL,DATABASE_DIRECT_URL,QDRANT_URL,QDRANT_API_KEY,LLM_API_KEY,LLM_BASE_URL,LLM_MODEL,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET,CALCOM_SECRET,CALCOM_ENCRYPTION_KEY,CALCOM_API_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,N8N_USER,N8N_PASSWORD,N8N_HOST,CALCOM_HOST,DOMAIN,AGENT_SECRET,AGENT_HOST,GH_PAT,GH_WEBHOOK_SECRET,GITLAB_PAT,GITLAB_WEBHOOK_SECRET,WHISPER_API_BASE,WHISPER_API_KEY,WHISPER_MODEL,VPS_SSH_KEY
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/ai-secretary' }}
            git pull origin main

            if [ -z "${AGENT_SECRET:-}" ]; then
              echo "AGENT_SECRET secret is required" >&2
              exit 1
            fi

            umask 077
            cat > .env << EOF
            TIMEZONE=Asia/Jakarta
            DOMAIN=${DOMAIN:-yourdomain.com}
            N8N_USER=${N8N_USER:-admin}
            N8N_PASSWORD=${N8N_PASSWORD:-changeme}
            N8N_HOST=${N8N_HOST:-}
            LLM_API_KEY=${LLM_API_KEY:-}
            LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
            LLM_MODEL=${LLM_MODEL:-gpt-4}
            LLM_PROVIDER=openai
            OPENAI_API_KEY=${LLM_API_KEY:-}
            OPENAI_API_BASE=${LLM_BASE_URL:-https://api.openai.com/v1}
            AGENT_SECRET=${AGENT_SECRET:-}
            QDRANT_URL=${QDRANT_URL:-}
            QDRANT_API_KEY=${QDRANT_API_KEY:-}
            CALCOM_HOST=${CALCOM_HOST:-}
            CALCOM_SECRET=${CALCOM_SECRET:-}
            CALCOM_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY:-}
            CALCOM_API_KEY=${CALCOM_API_KEY:-}
            DATABASE_URL=${DATABASE_URL:-}
            DATABASE_DIRECT_URL=${DATABASE_DIRECT_URL:-}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
            R2_BUCKET=${R2_BUCKET:-secretary-files}
            R2_ENDPOINT=https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
            SMTP_HOST=${SMTP_HOST:-}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USER=${SMTP_USER:-}
            SMTP_PASSWORD=${SMTP_PASSWORD:-}
            SMTP_FROM=${SMTP_FROM:-}
            GH_PAT=${GH_PAT:-}
            GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET:-}
            GITLAB_PAT=${GITLAB_PAT:-}
            GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET:-}
            AGENT_HOST=${AGENT_HOST:-}
            WHISPER_API_BASE=${WHISPER_API_BASE:-}
            WHISPER_API_KEY=${WHISPER_API_KEY:-}
            WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
            REPO_BASE_DIR=/repos
            REPOS_CONFIG_PATH=/app/repos.yml
            RESOURCE_DISK_WARN_PCT=80
            RESOURCE_DISK_CRIT_PCT=90
            RESOURCE_MEM_WARN_PCT=85
            RESOURCE_MEM_CRIT_PCT=92
            RESOURCE_QDRANT_WARN_POINTS=800000
            RESOURCE_QDRANT_CRIT_POINTS=950000
            MONITOR_SSH_TARGETS={"erpstg":{"host":"119.2.52.24","port":"3270","user":"ubuntu"}}
            EOF
            chmod 600 .env

            docker compose pull
            docker compose build --pull telegram-bot langgraph-agent
            docker compose up -d --remove-orphans
            docker compose up -d --force-recreate prometheus alertmanager
            docker image prune -f
            sleep 20
            if [ ! -f /home/ubuntu/.ssh/id_ed25519 ]; then
              sudo rm -rf /home/ubuntu/.ssh
              sudo mkdir -p /home/ubuntu/.ssh
              sudo chmod 700 /home/ubuntu/.ssh
              sudo chown $(id -u):$(id -g) /home/ubuntu/.ssh
              ssh-keygen -t ed25519 -f /home/ubuntu/.ssh/id_ed25519 -N "" -q
              ssh-keyscan -p 3270 119.2.52.24 >> /home/ubuntu/.ssh/known_hosts 2>/dev/null
              ssh-keyscan localhost >> /home/ubuntu/.ssh/known_hosts 2>/dev/null
              echo "=== NEW SSH KEY GENERATED ==="
              echo "Add this pubkey to erpstg authorized_keys:"
              cat /home/ubuntu/.ssh/id_ed25519.pub
              echo "=== END PUBKEY ==="
            fi
            docker exec telegram-bot sh -c "rm -rf /root/.ssh; mkdir -p /root/.ssh; chmod 700 /root/.ssh"
            cat /home/ubuntu/.ssh/id_ed25519 | docker exec -i telegram-bot sh -c "cat > /root/.ssh/id_ed25519 && chmod 600 /root/.ssh/id_ed25519"
            cat /home/ubuntu/.ssh/known_hosts | docker exec -i telegram-bot sh -c "cat > /root/.ssh/known_hosts" 2>/dev/null || true
            docker exec telegram-bot sh -c "rm -rf /root/.ssh; mkdir -p /root/.ssh; chmod 700 /root/.ssh"
            cat /home/ubuntu/.ssh/id_ed25519 | docker exec -i telegram-bot sh -c "cat > /root/.ssh/id_ed25519 && chmod 600 /root/.ssh/id_ed25519"
            cat /home/ubuntu/.ssh/known_hosts | docker exec -i telegram-bot sh -c "cat > /root/.ssh/known_hosts"
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
            echo "=== post-deploy health probes ==="
            docker exec langgraph-agent curl -fsS --max-time 5 http://localhost:8090/health
            docker exec n8n wget -qO- --timeout 5 http://localhost:5678/healthz
            echo "=== telegram-bot startup log (scheduler registration) ==="
            docker logs telegram-bot --tail 80 2>&1 | grep -E "scheduled|check sched|Application started|JobQueue|ERROR|Traceback" || echo "no relevant bot log lines"
            echo "=== prometheus active targets (job=node) ==="
            docker exec prometheus wget -qO- --timeout 5 'http://localhost:9090/api/v1/targets?state=active' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(t["labels"].get("instance_name","?"), t["scrapeUrl"], "health="+t["health"], "err="+t.get("lastError","")[:120], "lastScrape="+t.get("lastScrape","?")) for t in d["data"]["activeTargets"] if t["labels"].get("job")=="node"]' || echo "targets dump failed"
            sleep 35
            echo "=== prometheus targets after 35s wait ==="
            docker exec prometheus wget -qO- --timeout 5 'http://localhost:9090/api/v1/targets?state=active' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(t["labels"].get("instance_name","?"), "health="+t["health"], "err="+t.get("lastError","")[:120], "lastScrape="+t.get("lastScrape","?")) for t in d["data"]["activeTargets"] if t["labels"].get("job")=="node"]' || echo "targets dump failed"
