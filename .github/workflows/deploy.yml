name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - LICENSE
      - .gitignore
      - docs/**
      - .sisyphus/**
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Compile all Python sources
        run: |
          python -m compileall -q telegram-bot langgraph-agent

      - name: Actionlint workflows
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            | tar -xz -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

      - name: Pyflakes-class lint (ruff F)
        run: |
          pip install --quiet ruff
          ruff check --select=F telegram-bot langgraph-agent tests

      - name: Type check (mypy lenient)
        run: |
          pip install --quiet mypy
          pip install --quiet -r telegram-bot/requirements.txt
          pip install --quiet -r langgraph-agent/requirements.txt
          mypy --config-file=mypy.ini telegram-bot langgraph-agent

      - name: Type check (mypy strict on whitelisted modules)
        run: |
          mypy --strict \
            langgraph-agent/app/embedding.py \
            langgraph-agent/app/journal.py \
            langgraph-agent/app/telegram.py \
            langgraph-agent/app/tools.py

      - name: Orphan-reference checks (bot.py + agent main.py)
        run: python scripts/lint_orphan_refs.py

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -e N8N_HOST=n8n.example.com \
            -e CALCOM_HOST=calcom.example.com \
            -e AGENT_HOST=agent.example.com \
            -v "${{ github.workspace }}/caddy:/etc/caddy:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile

      - name: Validate Prometheus config + alert rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.4.0 \
            check config /etc/prometheus/prometheus.yml

      - name: Validate Alertmanager config
        run: |
          mkdir -p /tmp/alertmanager-validate
          sed \
            -e 's/PLACEHOLDER_BOT_TOKEN/123456:DUMMY_TOKEN_FOR_VALIDATION/' \
            -e 's/PLACEHOLDER_CHAT_ID/-1001234567890/' \
            prometheus/alertmanager.yml > /tmp/alertmanager-validate/alertmanager.yml
          docker run --rm \
            --entrypoint amtool \
            -v /tmp/alertmanager-validate:/etc/alertmanager:ro \
            prom/alertmanager:v0.28.1 \
            check-config /etc/alertmanager/alertmanager.yml

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pytest + bot/agent runtime deps
        run: |
          pip install --quiet pytest pytest-cov
          pip install --quiet -r telegram-bot/requirements.txt
          pip install --quiet -r langgraph-agent/requirements.txt

      - name: Run pytest
        run: pytest -v

      - name: Coverage summary to step summary
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          xml = pathlib.Path("coverage.xml")
          if not xml.exists():
              print("no coverage.xml; skipping summary")
              raise SystemExit(0)
          root = ET.parse(xml).getroot()
          line_rate = float(root.get("line-rate", 0)) * 100
          branch_rate = float(root.get("branch-rate", 0)) * 100
          lines_covered = int(root.get("lines-covered", 0))
          lines_valid = int(root.get("lines-valid", 0))
          packages = sorted(
              ((p.get("name"), float(p.get("line-rate", 0)) * 100) for p in root.iter("package")),
              key=lambda x: x[1],
          )
          parts = [
              "## Coverage Baseline",
              "",
              f"**Line coverage:** {line_rate:.1f}% ({lines_covered}/{lines_valid} lines)",
              f"**Branch coverage:** {branch_rate:.1f}%",
              "",
              "### Per-package breakdown",
              "",
              "| Package | Line % |",
              "|---------|--------|",
          ]
          for name, rate in packages:
              parts.append(f"| {name} | {rate:.1f}% |")
          parts.append("")
          parts.append("_No threshold enforced yet — this is a measurement baseline._")
          report = "\n".join(parts) + "\n"
          summary = pathlib.Path(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"))
          summary.write_text(report)
          print(report)
          EOF

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CALCOM_SECRET: ${{ secrets.CALCOM_SECRET }}
          CALCOM_ENCRYPTION_KEY: ${{ secrets.CALCOM_ENCRYPTION_KEY }}
          CALCOM_API_KEY: ${{ secrets.CALCOM_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          N8N_USER: ${{ secrets.N8N_USER }}
          N8N_PASSWORD: ${{ secrets.N8N_PASSWORD }}
          N8N_HOST: ${{ secrets.N8N_HOST }}
          CALCOM_HOST: ${{ secrets.CALCOM_HOST }}
          DOMAIN: ${{ secrets.DOMAIN }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          AGENT_HOST: ${{ secrets.AGENT_HOST }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          GITLAB_WEBHOOK_SECRET: ${{ secrets.GITLAB_WEBHOOK_SECRET }}
          WHISPER_API_BASE: ${{ secrets.WHISPER_API_BASE }}
          WHISPER_API_KEY: ${{ secrets.WHISPER_API_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USERS,DATABASE_URL,DATABASE_DIRECT_URL,QDRANT_URL,QDRANT_API_KEY,LLM_API_KEY,LLM_BASE_URL,LLM_MODEL,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET,CALCOM_SECRET,CALCOM_ENCRYPTION_KEY,CALCOM_API_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,N8N_USER,N8N_PASSWORD,N8N_HOST,CALCOM_HOST,DOMAIN,AGENT_SECRET,AGENT_HOST,GH_PAT,GH_WEBHOOK_SECRET,GITLAB_PAT,GITLAB_WEBHOOK_SECRET,WHISPER_API_BASE,WHISPER_API_KEY,WHISPER_MODEL,VPS_SSH_KEY
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/ai-secretary' }}
            git pull origin main

            if [ -z "${AGENT_SECRET:-}" ]; then
              echo "AGENT_SECRET secret is required" >&2
              exit 1
            fi

            umask 077
            cat > .env << EOF
            TIMEZONE=Asia/Jakarta
            DOMAIN=${DOMAIN:-yourdomain.com}
            N8N_USER=${N8N_USER:-admin}
            N8N_PASSWORD=${N8N_PASSWORD:-changeme}
            N8N_HOST=${N8N_HOST:-}
            LLM_API_KEY=${LLM_API_KEY:-}
            LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
            LLM_MODEL=${LLM_MODEL:-gpt-4}
            LLM_PROVIDER=openai
            OPENAI_API_KEY=${LLM_API_KEY:-}
            OPENAI_API_BASE=${LLM_BASE_URL:-https://api.openai.com/v1}
            AGENT_SECRET=${AGENT_SECRET:-}
            QDRANT_URL=${QDRANT_URL:-}
            QDRANT_API_KEY=${QDRANT_API_KEY:-}
            CALCOM_HOST=${CALCOM_HOST:-}
            CALCOM_SECRET=${CALCOM_SECRET:-}
            CALCOM_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY:-}
            CALCOM_API_KEY=${CALCOM_API_KEY:-}
            DATABASE_URL=${DATABASE_URL:-}
            DATABASE_DIRECT_URL=${DATABASE_DIRECT_URL:-}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
            R2_BUCKET=${R2_BUCKET:-secretary-files}
            R2_ENDPOINT=https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
            SMTP_HOST=${SMTP_HOST:-}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USER=${SMTP_USER:-}
            SMTP_PASSWORD=${SMTP_PASSWORD:-}
            SMTP_FROM=${SMTP_FROM:-}
            GH_PAT=${GH_PAT:-}
            GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET:-}
            GITLAB_PAT=${GITLAB_PAT:-}
            GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET:-}
            AGENT_HOST=${AGENT_HOST:-}
            WHISPER_API_BASE=${WHISPER_API_BASE:-}
            WHISPER_API_KEY=${WHISPER_API_KEY:-}
            WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
            REPO_BASE_DIR=/repos
            REPOS_CONFIG_PATH=/app/repos.yml
            RESOURCE_DISK_WARN_PCT=80
            RESOURCE_DISK_CRIT_PCT=90
            RESOURCE_MEM_WARN_PCT=85
            RESOURCE_MEM_CRIT_PCT=92
            RESOURCE_QDRANT_WARN_POINTS=800000
            RESOURCE_QDRANT_CRIT_POINTS=950000
            MONITOR_SSH_TARGETS={"erpstg":{"host":"119.2.52.24","port":"3270","user":"ubuntu"}}
            EOF
            chmod 600 .env

            docker compose pull
            docker compose build --pull telegram-bot langgraph-agent
            docker compose up -d --remove-orphans
            docker compose up -d --force-recreate prometheus alertmanager
            docker image prune -f
            sleep 20
            if [ ! -f /home/ubuntu/.ssh/id_ed25519 ]; then
              sudo rm -rf /home/ubuntu/.ssh
              sudo mkdir -p /home/ubuntu/.ssh
              sudo chmod 700 /home/ubuntu/.ssh
              sudo chown $(id -u):$(id -g) /home/ubuntu/.ssh
              ssh-keygen -t ed25519 -f /home/ubuntu/.ssh/id_ed25519 -N "" -q
              ssh-keyscan -p 3270 119.2.52.24 >> /home/ubuntu/.ssh/known_hosts 2>/dev/null
              ssh-keyscan localhost >> /home/ubuntu/.ssh/known_hosts 2>/dev/null
              echo "=== NEW SSH KEY GENERATED ==="
              echo "Add this pubkey to erpstg authorized_keys:"
              cat /home/ubuntu/.ssh/id_ed25519.pub
              echo "=== END PUBKEY ==="
            fi
            docker exec telegram-bot sh -c "rm -rf /root/.ssh; mkdir -p /root/.ssh; chmod 700 /root/.ssh"
            cat /home/ubuntu/.ssh/id_ed25519 | docker exec -i telegram-bot sh -c "cat > /root/.ssh/id_ed25519 && chmod 600 /root/.ssh/id_ed25519"
            cat /home/ubuntu/.ssh/known_hosts | docker exec -i telegram-bot sh -c "cat > /root/.ssh/known_hosts" 2>/dev/null || true
            docker exec telegram-bot sh -c "rm -rf /root/.ssh; mkdir -p /root/.ssh; chmod 700 /root/.ssh"
            cat /home/ubuntu/.ssh/id_ed25519 | docker exec -i telegram-bot sh -c "cat > /root/.ssh/id_ed25519 && chmod 600 /root/.ssh/id_ed25519"
            cat /home/ubuntu/.ssh/known_hosts | docker exec -i telegram-bot sh -c "cat > /root/.ssh/known_hosts"
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
            echo "=== post-deploy health probes ==="
            docker exec langgraph-agent curl -fsS --max-time 5 http://localhost:8090/health
            docker exec n8n wget -qO- --timeout 5 http://localhost:5678/healthz
            echo "=== telegram-bot startup log (scheduler registration) ==="
            docker logs telegram-bot --tail 80 2>&1 | grep -E "scheduled|check sched|Application started|JobQueue|ERROR|Traceback" || echo "no relevant bot log lines"
            echo "=== prometheus active targets (job=node) ==="
            docker exec prometheus wget -qO- --timeout 5 'http://localhost:9090/api/v1/targets?state=active' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(t["labels"].get("instance_name","?"), t["scrapeUrl"], "health="+t["health"], "err="+t.get("lastError","")[:120], "lastScrape="+t.get("lastScrape","?")) for t in d["data"]["activeTargets"] if t["labels"].get("job")=="node"]' || echo "targets dump failed"
            sleep 35
            echo "=== prometheus targets after 35s wait ==="
            docker exec prometheus wget -qO- --timeout 5 'http://localhost:9090/api/v1/targets?state=active' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(t["labels"].get("instance_name","?"), "health="+t["health"], "err="+t.get("lastError","")[:120], "lastScrape="+t.get("lastScrape","?")) for t in d["data"]["activeTargets"] if t["labels"].get("job")=="node"]' || echo "targets dump failed"
