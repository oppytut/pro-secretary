name: Run Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run on VPS"
        required: true
        type: string

concurrency:
  group: vps-command
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Execute on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/ai-secretary' }}
            ${{ inputs.command }}
