default_language_version:
  python: python3

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--select=F]
        files: ^(telegram-bot|langgraph-agent|tests)/.*\.py$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: local
    hooks:
      - id: compileall
        name: python -m compileall
        language: system
        entry: python3 -m compileall -q telegram-bot langgraph-agent
        pass_filenames: false
        files: ^(telegram-bot|langgraph-agent)/.*\.py$

      - id: orphan-refs
        name: orphan-reference checks
        language: system
        entry: python3 scripts/lint_orphan_refs.py
        pass_filenames: false
        files: ^(telegram-bot|langgraph-agent)/.*\.py$

      - id: docs-freshness
        name: docs-freshness lint (README + ARCHITECTURE.md)
        language: system
        entry: python3 scripts/lint_docs_freshness.py
        pass_filenames: false
        files: ^(README|ARCHITECTURE)\.md$|^telegram-bot/(infra|watchdogs)/.*\.py$

      - id: mypy
        name: mypy (lenient, pre-push)
        language: system
        entry: python3 -m mypy --config-file=mypy.ini telegram-bot langgraph-agent
        pass_filenames: false
        stages: [pre-push]
        files: ^(telegram-bot|langgraph-agent)/.*\.py$

      - id: mypy-strict
        name: mypy strict (whitelisted modules, pre-push)
        language: system
        entry: python3 -m mypy --strict langgraph-agent/app/config.py langgraph-agent/app/docs_sync.py langgraph-agent/app/embedding.py langgraph-agent/app/gitlab_review.py langgraph-agent/app/journal.py langgraph-agent/app/llm.py langgraph-agent/app/meeting_notes.py langgraph-agent/app/pr_review.py langgraph-agent/app/skills.py langgraph-agent/app/telegram.py langgraph-agent/app/test_coverage.py langgraph-agent/app/tools.py telegram-bot/infra/agent.py telegram-bot/infra/auth.py telegram-bot/infra/config_store.py telegram-bot/infra/gh.py telegram-bot/infra/prom.py telegram-bot/infra/ssh.py telegram-bot/watchdogs/capacity.py telegram-bot/watchdogs/deps.py telegram-bot/watchdogs/dns.py telegram-bot/watchdogs/drift.py telegram-bot/watchdogs/firewall.py telegram-bot/watchdogs/hygiene.py telegram-bot/watchdogs/morning_brief.py telegram-bot/watchdogs/ssl.py telegram-bot/watchdogs/test_coverage.py
        pass_filenames: false
        stages: [pre-push]
        files: ^(langgraph-agent/app/(config|docs_sync|embedding|gitlab_review|journal|llm|meeting_notes|pr_review|skills|telegram|tools)\.py|telegram-bot/(infra|watchdogs)/.*\.py)$
