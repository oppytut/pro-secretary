  #     resources:
  #       limits:
  #         memory: 2048M
  #         cpus: '1.5'
  #       reservations:
  #         memory: 512M
  #         cpus: '0.5'
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s

  # ============================================
  # VECTOR MEMORY - Qdrant Cloud (External)
  # ============================================
  # NOTE: Qdrant runs on Qdrant Cloud, not locally.
  # Saves 3-5 GB RAM. Free tier: 1GB storage, 1M vectors.
  # Sign up: https://cloud.qdrant.io
  # Configure QDRANT_URL and QDRANT_API_KEY in .env

  # ============================================
  # SCHEDULING - Cal.com
  # ============================================
  calcom:
    image: calcom/cal.com:latest
    container_name: calcom
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${CALCOM_SECRET}
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=https://${CALCOM_HOST}
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - CALCOM_TELEMETRY_DISABLED=1
      - TZ=${TIMEZONE}
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # TELEGRAM BOT
  # ============================================
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USERS}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/telegram
      - OPENFANG_URL=http://openfang:8090
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - TZ=${TIMEZONE}
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # ============================================
  # REVERSE PROXY - Caddy
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - N8N_HOST=${N8N_HOST}
      - CALCOM_HOST=${CALCOM_HOST}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

networks:
  secretary-net:
    driver: bridge

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
