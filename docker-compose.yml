# ============================================
# AI Personal Secretary Stack
# Target: VPS 4 vCPU / 8 GB RAM / 160 GB SSD / 5 TB Transfer
# Containers: 5 (n8n, OpenFang, Cal.com, Telegram Bot, Caddy)
# External: PostgreSQL, Qdrant Cloud, Cloudflare R2
# Total memory budget: ~6 GB (leaves 2 GB for OS + swap headroom)
# ============================================

services:
  # ============================================
  # ORCHESTRATOR - n8n
  # ============================================
  n8n:
    image: n8nio/n8n:2.20.7@sha256:ab26afca1a78fdb9b042eb6285565b869cdf1fd9c465cdcd9e2e5e7f764957d3
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=${TIMEZONE}
      - N8N_AI_ENABLED=true
      - N8N_METRICS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_OPTIONS=--max-old-space-size=512
      - AGENT_SECRET=${AGENT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TZ=${TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # AI AGENT ENGINE - LangGraph (replaces unavailable OpenFang)
  # ============================================
  langgraph-agent:
    build:
      context: ./langgraph-agent
      dockerfile: Dockerfile
    container_name: langgraph-agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - CALCOM_API_KEY=${CALCOM_API_KEY}
      - CALCOM_BASE_URL=http://calcom:3000
      - AGENT_SECRET=${AGENT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - DATABASE_URL=${DATABASE_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - GH_PAT=${GH_PAT}
      - GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET:-}
      - GITLAB_PAT=${GITLAB_PAT}
      - GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET:-}
      - REPO_BASE_DIR=${REPO_BASE_DIR:-/repos}
      - REPOS_CONFIG_PATH=${REPOS_CONFIG_PATH:-/app/repos.yml}
      - RESOURCE_ALERT_STATE_FILE=/app/state/resource-alert-state.json
      - RESOURCE_DISK_WARN_PCT=${RESOURCE_DISK_WARN_PCT:-80}
      - RESOURCE_DISK_CRIT_PCT=${RESOURCE_DISK_CRIT_PCT:-90}
      - RESOURCE_MEM_WARN_PCT=${RESOURCE_MEM_WARN_PCT:-85}
      - RESOURCE_MEM_CRIT_PCT=${RESOURCE_MEM_CRIT_PCT:-92}
      - RESOURCE_MEM_SUSTAINED_MINUTES=${RESOURCE_MEM_SUSTAINED_MINUTES:-30}
      - RESOURCE_SWAP_WARN_PCT=${RESOURCE_SWAP_WARN_PCT:-50}
      - RESOURCE_SWAP_CRIT_PCT=${RESOURCE_SWAP_CRIT_PCT:-70}
      - RESOURCE_QDRANT_WARN_POINTS=${RESOURCE_QDRANT_WARN_POINTS:-800000}
      - RESOURCE_QDRANT_CRIT_POINTS=${RESOURCE_QDRANT_CRIT_POINTS:-950000}
      - RESOURCE_POSTGRES_CONNECT_TIMEOUT_SEC=${RESOURCE_POSTGRES_CONNECT_TIMEOUT_SEC:-5}
      - RESOURCE_POSTGRES_STORAGE_WARN_MB=${RESOURCE_POSTGRES_STORAGE_WARN_MB:-400}
      - RESOURCE_POSTGRES_STORAGE_CRIT_MB=${RESOURCE_POSTGRES_STORAGE_CRIT_MB:-480}
      - RESOURCE_CONTAINER_MEM_WARN_PCT=${RESOURCE_CONTAINER_MEM_WARN_PCT:-85}
      - RESOURCE_CONTAINER_MEM_CRIT_PCT=${RESOURCE_CONTAINER_MEM_CRIT_PCT:-95}
      - TIMEZONE=${TIMEZONE}
      - TZ=${TIMEZONE}
    volumes:
      - langgraph_cache:/app/.fastembed_cache
      - repos_data:${REPO_BASE_DIR:-/repos}
      - agent_state:/app/state
      - ./vault:/vault:rw
      - /proc:/host/proc:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/backups:/host/var/backups:ro
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # VECTOR MEMORY - Qdrant Cloud (External)
  # ============================================
  # NOTE: Qdrant runs on Qdrant Cloud, not locally.
  # Saves 3-5 GB RAM. Free tier: 1GB storage, 1M vectors.
  # Sign up: https://cloud.qdrant.io
  # Configure QDRANT_URL and QDRANT_API_KEY in .env

  # ============================================
  # SCHEDULING - Cal.com
  # ============================================
  calcom:
    image: calcom/cal.com:latest@sha256:ace3bb1219fb7306585ab9f4d94d41af7ee064c343db0498173436bbe857bd49
    container_name: calcom
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_DIRECT_URL=${DATABASE_DIRECT_URL}
      - NEXTAUTH_SECRET=${CALCOM_SECRET}
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=https://${CALCOM_HOST}
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - CALCOM_TELEMETRY_DISABLED=1
      - EMAIL_FROM=${SMTP_FROM}
      - EMAIL_FROM_NAME=Pro Secretary
      - EMAIL_SERVER_HOST=${SMTP_HOST}
      - EMAIL_SERVER_PORT=${SMTP_PORT}
      - EMAIL_SERVER_USER=${SMTP_USER}
      - EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD}
      - TZ=${TIMEZONE}
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=20 http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 120s

  # ============================================
  # TELEGRAM BOT
  # ============================================
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USERS}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/telegram
      - AGENT_URL=http://langgraph-agent:8090
      - AGENT_SECRET=${AGENT_SECRET}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - WHISPER_API_BASE=${WHISPER_API_BASE:-}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-1}
      - MAX_VOICE_DURATION_SEC=${MAX_VOICE_DURATION_SEC:-300}
      - PROMETHEUS_URL=http://prometheus:9090
      - MONITOR_SSH_TARGETS=${MONITOR_SSH_TARGETS:-}
      - GH_PAT=${GH_PAT}
      - MORNING_BRIEF_ENABLED=${MORNING_BRIEF_ENABLED:-true}
      - MORNING_BRIEF_HOUR=${MORNING_BRIEF_HOUR:-7}
      - MORNING_BRIEF_MINUTE=${MORNING_BRIEF_MINUTE:-0}
      - AUTO_FIX_ENABLED=${AUTO_FIX_ENABLED:-true}
      - DISK_AUTOFIX_THRESHOLD_PCT=${DISK_AUTOFIX_THRESHOLD_PCT:-90}
      - DRIFT_CHECK_ENABLED=${DRIFT_CHECK_ENABLED:-true}
      - DRIFT_CHECK_HOUR=${DRIFT_CHECK_HOUR:-2}
      - DRIFT_CHECK_MINUTE=${DRIFT_CHECK_MINUTE:-0}
      - SSL_CHECK_ENABLED=${SSL_CHECK_ENABLED:-true}
      - SSL_CHECK_DOMAINS=${SSL_CHECK_DOMAINS:-}
      - SSL_WARN_DAYS=${SSL_WARN_DAYS:-30}
      - CAPACITY_CHECK_ENABLED=${CAPACITY_CHECK_ENABLED:-true}
      - CAPACITY_CHECK_HOUR=${CAPACITY_CHECK_HOUR:-2}
      - CAPACITY_CHECK_MINUTE=${CAPACITY_CHECK_MINUTE:-10}
      - CAPACITY_WARN_DAYS=${CAPACITY_WARN_DAYS:-14}
      - TZ=${TIMEZONE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - bot_data:/app/data
    depends_on:
      n8n:
        condition: service_healthy
      langgraph-agent:
        condition: service_healthy
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # ============================================
  # REVERSE PROXY - Caddy
  # ============================================
  caddy:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - N8N_HOST=${N8N_HOST}
      - CALCOM_HOST=${CALCOM_HOST}
      - AGENT_HOST=${AGENT_HOST:-}
      - TZ=${TIMEZONE}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  # ============================================
  # MONITORING - Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # MONITORING - Alertmanager
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_ALLOWED_USERS}
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./prometheus/alertmanager-entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.05'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  secretary-net:
    driver: bridge

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
  langgraph_cache:
  repos_data:
  agent_state:
  prometheus_data:
  alertmanager_data:
  bot_data:
