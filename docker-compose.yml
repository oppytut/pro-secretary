version: "3.8"

# ============================================
# AI Personal Secretary Stack
# Optimized for 4 cores / 8GB RAM
# Uses Qdrant Cloud (external) instead of local Qdrant
# ============================================

services:
  # ============================================
  # ORCHESTRATOR - n8n
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=${TIMEZONE}
      - N8N_AI_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.5'

  # ============================================
  # AI AGENT ENGINE - OpenFang
  # ============================================
  openfang:
    image: ghcr.io/rightnow-ai/openfang:latest
    container_name: openfang
    restart: always
    ports:
      - "8090:8090"
    environment:
      - OPENFANG_CONFIG=/etc/openfang/secretary.toml
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      # Qdrant Cloud (External)
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    volumes:
      - ./openfang/secretary.toml:/etc/openfang/secretary.toml
      - openfang_data:/var/lib/openfang
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ============================================
  # VECTOR MEMORY - Qdrant Cloud (External)
  # ============================================
  # NOTE: Qdrant runs on Qdrant Cloud, not locally
  # This saves 3-5 GB RAM on your server
  # Free tier: 1GB storage, 1M vectors
  # Sign up: https://cloud.qdrant.io
  # Configure QDRANT_URL and QDRANT_API_KEY in .env

  # ============================================
  # SCHEDULING - Cal.com
  # ============================================
  calcom:
    image: calcom/cal.com:latest
    container_name: calcom
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${CALCOM_SECRET}
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=https://${CALCOM_HOST}
      - CALCOM_API_KEY=${CALCOM_API_KEY}
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1536M  # 1.5 GB
          cpus: '0.75'
        reservations:
          memory: 768M
          cpus: '0.25'

  # ============================================
  # TELEGRAM BOT
  # ============================================
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - OPENFANG_URL=http://openfang:8090
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  # ============================================
  # REVERSE PROXY - Caddy
  # ============================================
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  secretary-net:
    driver: bridge

volumes:
  n8n_data:
  openfang_data:
  caddy_data:
  caddy_config:
