# ============================================
# AI Personal Secretary Stack
# Target: VPS 4 vCPU / 8 GB RAM / 160 GB SSD / 5 TB Transfer
# Containers: 5 (n8n, OpenFang, Cal.com, Telegram Bot, Caddy)
# External: PostgreSQL, Qdrant Cloud, Cloudflare R2
# Total memory budget: ~6 GB (leaves 2 GB for OS + swap headroom)
# ============================================

services:
  # ============================================
  # ORCHESTRATOR - n8n
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=${TIMEZONE}
      - N8N_AI_ENABLED=true
      - N8N_METRICS=true
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - secretary-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # AI AGENT ENGINE - OpenFang (DISABLED - image unavailable)
