[mypy]
python_version = 3.12
ignore_missing_imports = True
no_strict_optional = True
follow_imports = silent
warn_unused_ignores = True

# PTB 22 callback_query.message is MaybeInaccessibleMessage in type stubs but
# always accessible at runtime when triggered by an inline button. Suppress
# attr-defined for that specific pattern.
[mypy-bot]
disable_error_code = attr-defined

# qdrant-client uses invariant list[T] in many signatures; passing list[FieldCondition]
# where Sequence[Filter|FieldCondition|...] is technically expected is safe at runtime.
[mypy-app.qdrant_helper]
disable_error_code = arg-type

[mypy-app.sync]
disable_error_code = arg-type

# slowapi rate limit exception handler signature mismatch with Starlette's
# generic Callable[[Request, Exception], ...] - upstream typing issue.
[mypy-app.main]
disable_error_code = arg-type
