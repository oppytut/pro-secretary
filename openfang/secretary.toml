[agent]
name = "Secretary"
description = "Personal AI Secretary yang tahu semua pekerjaan saya"
mode = "daemon"
personality = """
Kamu adalah sekretaris pribadi AI yang sangat efisien dan proaktif.
Kamu tahu semua jadwal, task, project, dan konteks pekerjaan saya.
Kamu berkomunikasi dalam Bahasa Indonesia yang natural.
Kamu memberikan reminder tanpa diminta jika ada deadline mendekat.
"""

[llm]
provider = "openai"
model = "${LLM_MODEL}"
base_url = "${LLM_BASE_URL}"
api_key = "${LLM_API_KEY}"
temperature = 0.7
max_tokens = 2048

[llm.fallback]
provider = "openai"
model = "gpt-3.5-turbo"
api_key = "${LLM_API_KEY}"
base_url = "${LLM_BASE_URL}"

[memory]
type = "qdrant"
url = "${QDRANT_URL}"
api_key = "${QDRANT_API_KEY}"
collection = "agent_memory"

[hands]
enabled = [
  "web_search",
  "calendar_read",
  "calendar_write",
  "file_read",
  "task_manage",
  "email_send",
  "reminder_set"
]

[hands.calendar]
provider = "calcom"
api_url = "http://calcom:3000/api"
api_key = "${CALCOM_API_KEY}"

[hands.email]
provider = "smtp"
smtp_host = "${SMTP_HOST}"
smtp_port = "${SMTP_PORT}"
smtp_user = "${SMTP_USER}"
smtp_password = "${SMTP_PASSWORD}"
from_email = "${SMTP_FROM}"

[hands.storage]
provider = "s3"
endpoint = "${R2_ENDPOINT}"
access_key = "${R2_ACCESS_KEY_ID}"
secret_key = "${R2_SECRET_ACCESS_KEY}"
bucket = "${R2_BUCKET}"
region = "auto"

[hands.tasks]
provider = "qdrant"
collection = "tasks"

[channels]
enabled = ["telegram", "webhook"]

[channels.telegram]
token = "${TELEGRAM_BOT_TOKEN}"
allowed_users = ["${TELEGRAM_ALLOWED_USERS}"]

[channels.webhook]
port = 8090
secret = "${OPENFANG_SECRET}"

[daemon]
enabled = true
check_interval = "5m"
proactive_hours = { start = 7, end = 22 }

[daemon.routines]
morning_briefing = "0 7 * * *"
task_reminder = "0 */2 * * *"
eod_summary = "0 21 * * *"
