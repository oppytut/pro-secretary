global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "instance_name"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: telegram
      repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "PLACEHOLDER_BOT_TOKEN"
        chat_id: PLACEHOLDER_CHAT_ID
        parse_mode: HTML
        message: |
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} <b>{{ .Status | toUpper }}</b>
          {{ range .Alerts }}
          <b>{{ .Labels.alertname }}</b> [{{ .Labels.severity }}]
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
