global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # VPS targets
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance_name: "pro-secretary"
          provider: "digitalocean"
      - targets: ["119.2.52.24:19100"]
        labels:
          instance_name: "erpstg"
          provider: "biznet"

  # Add more VPS targets below by appending another `- targets: [...]` block above
