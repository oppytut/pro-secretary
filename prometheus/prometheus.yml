global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Pro-secretary VPS (this host)
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance_name: "pro-secretary"
          provider: "digitalocean"

  # Add more VPS targets below:
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["<IP>:9100"]
  #       labels:
  #         instance_name: "<name>"
  #         provider: "<provider>"
