global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # VPS targets
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance_name: "pro-secretary"
          provider: "digitalocean"
      - targets: ["119.2.52.24:19100"]
        labels:
          instance_name: "erpstg"
          provider: "biznet"

  # Add more VPS targets below by appending another `- targets: [...]` block above

  # Container metrics (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance_name: "pro-secretary"
          provider: "digitalocean"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "container_(network_.*|fs_.*_seconds_total|tasks_state|file_descriptors|sockets|threads.*|ulimits.*|processes|start_time_seconds)"
        action: drop
      - source_labels: [container_label_com_docker_compose_project,container_label_com_docker_compose_service]
        regex: ";"
        action: drop
